<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergen V2 - Otomatik Gelişim İzleme</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', sans-serif; background:linear-gradient(135deg, #0f2027, #203a43, #2c5364); color:#fff; min-height:100vh; padding:20px; }
        .container { max-width:1200px; margin:0 auto; }
        header { text-align:center; margin-bottom:30px; padding:20px; background:rgba(255,255,255,0.1); border-radius:15px; }
        h1 { font-size:2.5em; margin-bottom:10px; }
        .subtitle { font-size:1.2em; opacity:0.9; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:rgba(255,255,255,0.15); padding:20px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); }
        .stat-card h3 { font-size:0.9em; opacity:0.8; margin-bottom:10px; }
        .stat-card .value { font-size:2em; font-weight:bold; }
        .grade-display { text-align:center; padding:30px; background:rgba(255,255,255,0.1); border-radius:15px; margin-bottom:30px; }
        .grade-number { font-size:5em; font-weight:bold; color:#4caf50; text-shadow:0 0 20px rgba(76,175,80,0.5); }
        .progress-bar { width:100%; height:30px; background:rgba(255,255,255,0.1); border-radius:15px; overflow:hidden; margin-top:20px; }
        .progress-fill { height:100%; background:linear-gradient(90deg, #4caf50, #8bc34a); width:0%; transition:width 1s; }
        .log-section { background:rgba(0,0,0,0.3); border-radius:10px; padding:20px; margin-top:20px; }
        .log-entry { padding:8px; border-bottom:1px solid rgba(255,255,255,0.1); font-family:monospace; font-size:0.9em; }
        .timestamp { color:#888; margin-right:10px; }
        .loading { text-align:center; padding:40px; }
        .error { background:rgba(244,67,54,0.3); padding:15px; border-radius:8px; margin:10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Mergen V2 - Otomatik Gelişim</h1>
            <p class="subtitle">1. Sınıftan 12. Sınıfa kadar sürekli öğrenme ve kod geliştirme</p>
        </header>
        
        <div class="grade-display">
            <div>Mevcut Seviye</div>
            <div class="grade-number" id="currentGrade">1</div>
            <div id="gradeName">Yükleniyor...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>TOPLAM GELİŞTİRME</h3>
                <div class="value" id="totalImprovements">0</div>
            </div>
            <div class="stat-card">
                <h3>KULLANILAN MODEL</h3>
                <div class="value" id="modelsUsed">0</div>
            </div>
            <div class="stat-card">
                <h3>DEĞİŞTİRİLEN DOSYA</h3>
                <div class="value" id="filesModified">0</div>
            </div>
            <div class="stat-card">
                <h3>HATA SAYISI</h3>
                <div class="value" id="totalErrors">0</div>
            </div>
        </div>
        
        <div class="log-section">
            <h2>📝 Gelişim Kayıtları</h2>
            <div id="logEntries">
                <div class="loading">Yükleniyor...</div>
            </div>
        </div>
    </div>
    
    <script>
        let updateInterval;
        
        async function loadStatus() {
            try {
                const response = await fetch('status.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Sunucu yanıt vermiyor');
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error('Hata:', error);
                document.getElementById('logEntries').innerHTML = 
                    '<div class="error">Bağlantı hatası: ' + error.message + '<br>Lütfen monitor sunucusunun çalıştığından emin olun.</div>';
            }
        }
        
        function updateUI(data) {
            // Sınıf seviyesi
            const grade = data.current_grade || 1;
            document.getElementById('currentGrade').textContent = grade;
            
            const gradeNames = {
                1: "1. Sınıf - Okuma Yazma",
                2: "2. Sınıf - Temel İşlemler",
                3: "3. Sınıf - Dört İşlem",
                4: "4. Sınıf - Kesirler",
                5: "5. Sınıf - Tam Sayılar",
                6: "6. Sınıf - Rasyonel Sayılar",
                7: "7. Sınıf - Cebirsel İfadeler",
                8: "8. Sınıf - Kareköklü Sayılar",
                9: "9. Sınıf - Polinomlar",
                10: "10. Sınıf - İkinci Dereceden",
                11: "11. Sınıf - Logaritma",
                12: "12. Sınıf - Türev-İntegral"
            };
            document.getElementById('gradeName').textContent = gradeNames[grade] || "İnsan Beyni";
            
            // İlerleme çubuğu
            const progress = ((grade - 1) / 11) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            
            // İstatistikler
            const stats = data.stats || {};
            document.getElementById('totalImprovements').textContent = stats.total_improvements || 0;
            document.getElementById('modelsUsed').textContent = (stats.models_used || []).length;
            document.getElementById('filesModified').textContent = (stats.files_modified || []).length;
            document.getElementById('totalErrors').textContent = stats.total_errors || 0;
            
            // Log kayıtları
            const logDiv = document.getElementById('logEntries');
            const evolutionLog = data.evolution_log || [];
            
            if (evolutionLog.length === 0) {
                logDiv.innerHTML = '<div class="loading">Henüz kayıt yok</div>';
            } else {
                logDiv.innerHTML = evolutionLog.slice(-20).reverse().map(entry => `
                    <div class="log-entry">
                        <span class="timestamp">${new Date(entry.timestamp).toLocaleTimeString('tr-TR')}</span>
                        <strong>${entry.file || 'Sistem'}</strong> - ${entry.model || ''} - ${entry.topic || ''}
                    </div>
                `).join('');
            }
        }
        
        // Sayfa yüklendiğinde ve her 3 saniyede bir yenile
        window.onload = () => {
            loadStatus();
            updateInterval = setInterval(loadStatus, 3000);
        };
        
        window.onbeforeunload = () => {
            if (updateInterval) clearInterval(updateInterval);
        };
    </script>
</body>
</html>
